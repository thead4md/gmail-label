app = "mailmind-adam"
# waw (Warsaw) is the closest Fly region to Hungary. NOTE: the existing
# mailmind_data volume lives in ams — this setting alone doesn't move it;
# a `fly volumes create`/data-copy in waw plus a machine cutover is needed
# for the running app and its data to actually relocate.
primary_region = "waw"

# Fly secrets required (set via `fly secrets set NAME=value --app mailmind-adam`;
# NEVER put these in [env] below — [env] is plaintext in this file):
#   MAILMIND_POLL_SECRET_TOKEN   Shared secret for POST /internal/poll's
#                                X-Poll-Secret header (see MAILMIND_RUN_MODE
#                                below and .github/workflows/poll-trigger.yml).
#                                Must match the GitHub Actions repo secret of
#                                the same name. The endpoint 503s until this
#                                is set — required for MAILMIND_RUN_MODE=external.
#   DEEPSEEK_API_KEY / OPENAI_API_KEY, DASHBOARD_PASSWORD, DASHBOARD_SECRET,
#   GMAIL_TOKEN[_<SLUG>], LITESTREAM_* — see README.md's "Required Fly secrets".

[build]

[env]
  MAILMIND_USER_EMAIL = "dudas.adam@cserkesz.hu"
  MAILMIND_DB_PATH = "/data/mailmind.db"
  MAILMIND_DATA_DIR = "/data/.mailmind"
  MAILMIND_MODEL_PATH = "/data/.mailmind/model.pkl"
  MAILMIND_POLL_SECONDS = "120"
  # "external" disables the in-process `run --watch` loop (see
  # mailmind/fly-start.sh) and lets an outside trigger drive cycles via
  # POST /internal/poll instead (see .github/workflows/poll-trigger.yml).
  # This is what makes the scale-to-zero settings below ([http_service]
  # auto_stop_machines/min_machines_running) safe: no background loop's
  # state is lost when the machine suspends. Requires the
  # MAILMIND_POLL_SECRET_TOKEN Fly secret to be set (see below) — the
  # endpoint returns 503 until it is.
  MAILMIND_RUN_MODE = "external"
  # Content-first labeling: fold the content-rules vote into the 80/20 blend
  # instead of letting the rules engine hard-short-circuit. See classifier_router.
  FOLD_RULES_INTO_CONTENT = "true"
  CONTENT_RULE_WEIGHT = "0.30"
  # CPU optimization: pin numpy/scikit-learn BLAS + OpenMP to a single thread.
  # The machine has one shared vCPU; without these, BLAS oversubscribes threads
  # that contend over that one core (context-switch overhead) and allocate extra
  # per-thread memory. Single-threaded is faster here and trims the OOM margin.
  OMP_NUM_THREADS = "1"
  OPENBLAS_NUM_THREADS = "1"
  MKL_NUM_THREADS = "1"
  NUMEXPR_NUM_THREADS = "1"

[[mounts]]
  source = "mailmind_data"
  destination = "/data"
  processes = ["app"]

[[vm]]
  # Right-sized for a single-user, bursty workload (120s poll + weekly retrain).
  # Observed load avg ~0.11 on 1 core (≈90% idle) — more CPUs would sit unused.
  # The earlier crash was a MEMORY (OOM) issue, fixed by 512mb → 1gb. Keep shared/1.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "/fly-start.sh"

[http_service]
  internal_port = 8501
  force_https = true
  # Scale-to-zero: the machine stops when idle and cold-starts on the next
  # request/poll trigger. Safe only because MAILMIND_RUN_MODE=external above
  # means there's no long-lived watch-loop process/state to lose between
  # stops, AND because SafetyPolicy's action rate limiter is now persisted
  # to the DB (see mailmind/actions/safety.py's `db` param) rather than
  # living only in-process. Do not flip these back without also reverting
  # MAILMIND_RUN_MODE to unset/"watch".
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # uvicorn takes a moment to bind 8501 on boot. Without an explicit check,
  # fly-proxy probes the socket immediately and logs a spurious
  # "not listening on 8501" warning on every deploy. The grace_period holds
  # the first probe until the app's own /healthz endpoint is up.
  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/healthz"
