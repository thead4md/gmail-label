app = "mailmind-adam"
primary_region = "ams"

[build]

[env]
  MAILMIND_DB_PATH = "/data/mailmind.db"
  MAILMIND_DATA_DIR = "/data/.mailmind"
  MAILMIND_MODEL_PATH = "/data/.mailmind/model.pkl"

[[mounts]]
  source = "mailmind_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8501

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [services.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
