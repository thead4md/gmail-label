# Litestream config for Mac Mini (replication source)
# Run via litestream-mac.sh
#
# Required env vars (export before running litestream-mac.sh):
#   LITESTREAM_ACCESS_KEY_ID
#   LITESTREAM_SECRET_ACCESS_KEY
#   LITESTREAM_S3_BUCKET
#   LITESTREAM_S3_ENDPOINT       (required for Backblaze B2 / Tigris)

dbs:
  - path: /Users/adamdudas/.mailmind/mailmind.db
    replicas:
      - type: s3
        bucket: $LITESTREAM_S3_BUCKET
        path: mailmind.db
        endpoint: $LITESTREAM_S3_ENDPOINT
        access-key-id: $LITESTREAM_ACCESS_KEY_ID
        secret-access-key: $LITESTREAM_SECRET_ACCESS_KEY
        sync-interval: 10s
        retention: 24h
