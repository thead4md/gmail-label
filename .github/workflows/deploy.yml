name: Deploy to Fly.io
#
# Required GitHub repo secret:
#   FLY_API_TOKEN   Fly.io deploy token (`fly tokens create deploy -x 999999h`
#                   or from the Fly dashboard). Add it under
#                   Settings -> Secrets and variables -> Actions.
#
# Deploys are otherwise manual (`fly deploy --app mailmind-adam`) today; this
# workflow is what automates that on every push to master.

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only --app mailmind-adam
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
