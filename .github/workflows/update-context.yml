name: Update CONTEXT.md

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "CONTEXT.md"
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update-context:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" --quiet 2>/dev/null || pip install -e "." --quiet 2>/dev/null || true
          pip install pytest --quiet

      - name: Update CONTEXT.md
        run: python scripts/update_context.py

      - name: Validate CONTEXT.md
        run: |
          BASE="https://raw.githubusercontent.com/thead4md/claude-context-sync/main"
          curl -fsSL "${BASE}/scripts/validate_context.py" -o /tmp/validate_context.py
          python /tmp/validate_context.py --context CONTEXT.md --claude CLAUDE.md --report validate_report.json || true

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: context-validation-report
          path: validate_report.json
          retention-days: 30

      - name: Commit if changed
        run: |
          if git diff --quiet CONTEXT.md; then
            echo "No changes"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CONTEXT.md
            git commit -m "chore: update CONTEXT.md [auto]"
            BRANCH="${{ github.head_ref || github.ref_name }}"
            git push origin HEAD:"$BRANCH"
          fi

      - name: Comment diff on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = require('child_process')
              .execSync('git diff CONTEXT.md', {encoding: 'utf8'})
              .slice(0, 3000);
            if (!diff) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CONTEXT.md will be updated by this PR\n\n<details><summary>Diff</summary>\n\n\`\`\`diff\n${diff}\n\`\`\`\n\n</details>`
            });
