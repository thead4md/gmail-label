[pytest]
# Tests must be invoked with absolute paths to avoid macOS case-insensitive
# filesystem resolving the CWD as /Volumes/T7/PyProjects/MailMind (original
# disk case), which causes pytest to import conftest as MailMind.tests.conftest
# instead of mailmind.tests.conftest.
#
# Correct invocation (from anywhere):
#   /Volumes/T7/PyProjects/mailmind/.venv/bin/python -m pytest \
#       /Volumes/T7/PyProjects/mailmind/tests/ -v
